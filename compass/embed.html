<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests" />
  <title>Impact Compass — embeddable problem card</title>
  <meta name="robots" content="noindex" />
  <script defer data-domain="panoskokmotos.com" src="https://plausible.io/js/script.js"></script>
  <style>
    /* Self-contained: this file is embedded as an iframe on third-party
       sites, so it carries its own minimal styles — no app.css dependency. */
    :root {
      --bg: #0e1530; --card: #131c36; --border: rgba(148,168,220,0.16);
      --text: #e9edf8; --dim: #9aa7c7; --gold: #e9b64a;
      --green: #3ecf8e; --red: #f4718b; --amber: #f0a35e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      background: transparent; color: var(--text);
    }
    .card {
      background: linear-gradient(160deg, var(--card), var(--bg));
      border: 1px solid var(--border); border-radius: 16px;
      padding: 18px; max-width: 460px; margin: 0 auto;
    }
    .top { display: flex; align-items: center; gap: 10px; }
    .emoji { font-size: 2rem; line-height: 1; }
    .name { font-weight: 800; font-size: 1.05rem; letter-spacing: -0.01em; }
    .badge {
      margin-left: auto; padding: 3px 10px; border-radius: 99px;
      font-size: 0.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em;
    }
    .improving { background: rgba(62,207,142,0.14); color: var(--green); }
    .worsening { background: rgba(244,113,139,0.13); color: var(--red); }
    .mixed     { background: rgba(240,163,94,0.14);  color: var(--amber); }
    .stat { color: var(--dim); font-size: 0.85rem; line-height: 1.55; margin-top: 10px; }
    .mis {
      border-left: 3px solid var(--gold); background: rgba(233,182,74,0.10);
      border-radius: 0 10px 10px 0; padding: 9px 12px; margin-top: 12px; font-size: 0.8rem; line-height: 1.5;
    }
    .mis b { color: var(--gold); font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 2px; }
    .foot { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
    .cta {
      display: inline-block; padding: 9px 16px; border-radius: 10px;
      background: var(--gold); color: #221703; font-weight: 800; font-size: 0.82rem; text-decoration: none;
    }
    .brand { color: var(--dim); font-size: 0.68rem; text-decoration: none; margin-left: auto; }
    .brand:hover { color: var(--gold); }
  </style>
</head>
<body>
  <div class="card" id="card"><noscript>Impact Compass problem card requires JavaScript. Explore the Atlas at https://tools.panoskokmotos.com/compass/</noscript></div>
  <script src="./data.js"></script>
  <script>
    (function () {
      var TREND = { improving: '↗ Improving', worsening: '↘ Worsening', mixed: '↔ Mixed' };
      var params = new URLSearchParams(location.search);
      var id = params.get('problem');
      var p = id && compassProblem(id);
      if (!p) {
        // no/unknown id → rotate daily so embedded cards stay fresh
        p = COMPASS_PROBLEMS[Math.floor(Date.now() / 86400000) % COMPASS_PROBLEMS.length];
      }
      function esc(s) {
        return String(s).replace(/[&<>"']/g, function (c) {
          return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
        });
      }
      var page = 'https://tools.panoskokmotos.com/compass/p/' + p.id + '.html';
      document.getElementById('card').innerHTML =
        '<div class="top"><span class="emoji">' + p.emoji + '</span>' +
        '<span class="name">' + esc(p.name) + '</span>' +
        '<span class="badge ' + p.trend.dir + '">' + TREND[p.trend.dir] + '</span></div>' +
        '<div class="stat">' + esc(p.stat) + '.</div>' +
        '<div class="mis"><b>Common misconception</b>' + esc(p.understand.misconception) + '</div>' +
        '<div class="foot"><a class="cta" href="' + page + '" target="_blank" rel="noopener">Understand &amp; act →</a>' +
        '<a class="brand" href="https://tools.panoskokmotos.com/compass/" target="_blank" rel="noopener">🧭 Impact Compass</a></div>';
      document.title = p.name + ' — Impact Compass card';
    })();
  </script>
</body>
</html>
