<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16224a"/>
      <stop offset="1" stop-color="#0a0f1e"/>
    </linearGradient>
    <linearGradient id="goldN" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7d581"/>
      <stop offset="1" stop-color="#e0a12e"/>
    </linearGradient>
    <clipPath id="globe"><circle cx="256" cy="256" r="150"/></clipPath>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#bg)"/>

  <!-- faint globe: equator + two longitude arcs -->
  <g clip-path="url(#globe)" fill="none" stroke="#5b8cff" stroke-opacity="0.16" stroke-width="4">
    <line x1="106" y1="256" x2="406" y2="256"/>
    <ellipse cx="256" cy="256" rx="150" ry="150"/>
    <ellipse cx="256" cy="256" rx="74" ry="150"/>
    <ellipse cx="256" cy="256" rx="150" ry="74"/>
  </g>

  <!-- outer ring -->
  <circle cx="256" cy="256" r="174" fill="none" stroke="#31406f" stroke-width="12"/>
  <circle cx="256" cy="256" r="174" fill="none" stroke="url(#goldN)" stroke-width="4" stroke-opacity="0.55"/>

  <!-- cardinal ticks -->
  <g fill="#4a5c92">
    <rect x="251" y="70" width="10" height="30" rx="5"/>
    <rect x="251" y="412" width="10" height="30" rx="5"/>
    <rect x="70" y="251" width="30" height="10" rx="5"/>
    <rect x="412" y="251" width="30" height="10" rx="5"/>
  </g>

  <!-- secondary (diagonal) points, muted -->
  <g fill="#3a4b7d" opacity="0.9">
    <path d="M256 256 L330 182 L286 226 Z"/>
    <path d="M256 256 L330 330 L286 286 Z"/>
    <path d="M256 256 L182 330 L226 286 Z"/>
    <path d="M256 256 L182 182 L226 226 Z"/>
  </g>

  <!-- primary compass star: E/S/W steel-blue, N gold — each faceted -->
  <g>
    <!-- East -->
    <path d="M256 256 L404 256 L256 234 Z" fill="#6d8fd6"/>
    <path d="M256 256 L404 256 L256 278 Z" fill="#42588f"/>
    <!-- West -->
    <path d="M256 256 L108 256 L256 234 Z" fill="#5877b8"/>
    <path d="M256 256 L108 256 L256 278 Z" fill="#37497a"/>
    <!-- South -->
    <path d="M256 256 L256 404 L234 256 Z" fill="#5877b8"/>
    <path d="M256 256 L256 404 L278 256 Z" fill="#37497a"/>
    <!-- North (gold, emphasized) -->
    <path d="M256 256 L256 100 L232 256 Z" fill="#e8b64a"/>
    <path d="M256 256 L256 100 L280 256 Z" fill="url(#goldN)"/>
  </g>

  <!-- center hub -->
  <circle cx="256" cy="256" r="28" fill="#0a0f1e"/>
  <circle cx="256" cy="256" r="28" fill="none" stroke="url(#goldN)" stroke-width="7"/>
  <circle cx="256" cy="256" r="7" fill="url(#goldN)"/>
</svg>
