name = "compass-notify"
main = "worker.js"
compatibility_date = "2024-11-01"

# Daily send — 08:00 UTC. Adjust the cron as you like.
[triggers]
crons = ["0 8 * * *"]

# KV namespace holding subscribers. Create it and paste the id:
#   npx wrangler kv namespace create SUBS
[[kv_namespaces]]
binding = "SUBS"
id = "PASTE_YOUR_KV_NAMESPACE_ID_HERE"

[vars]
VAPID_PUBLIC_KEY = "BLSXOCS4Igt3Dif9hGeKNeKdcgznMnRlTFiwQafvp8S_CnK6Ky1M6Sk8OWwBzmKzAJHg8igvAiNlSHguXK7vUqA"
VAPID_SUBJECT = "mailto:panos@givelink.app"
FROM_EMAIL = "Impact Compass <compass@panoskokmotos.com>"

# Secrets (set with `npx wrangler secret put NAME`, not here):
#   VAPID_PRIVATE_KEY   → the base64url 'd' from vapid-keys (see SETUP.md)
#   RESEND_API_KEY      → from resend.com (for email)
