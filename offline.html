    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      text-align: center;

    .offline-wrap { max-width: 420px; }
    .offline-icon { font-size: 4rem; margin-bottom: 20px; display: block; }
    h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 10px; }
    p { color: var(--text-muted); line-height: 1.7; margin-bottom: 28px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 26px;
      background: var(--blue); color: #fff;
      border-radius: 10px; font-weight: 700; font-size: 0.9rem;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .contact-hint {
      margin-top: 24px;
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    .contact-hint a { color: var(--blue); text-decoration: none; }
